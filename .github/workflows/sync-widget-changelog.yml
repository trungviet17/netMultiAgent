name: Sync Widget Changelog

on:
  # Triggered from agents-ui repo on release (see agents-ui/.github/workflows/notify-agents-docs.yml)
  repository_dispatch:
    types: [widget-release]
  # Manual trigger
  workflow_dispatch:

concurrency:
  group: widget-changelog-sync
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync @inkeep/agents-ui-cloud changelog
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install
        uses: ./.github/composite-actions/install

      - name: Generate widget changelog
        run: pnpm --filter @inkeep/agents-docs generate-widget-changelog
        env:
          GITHUB_TOKEN: ${{ secrets.AGENTS_UI_READ_PAT }}

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: sync/widget-changelog
          commit-message: "docs: sync @inkeep/agents-ui-cloud changelog"
          title: "docs: sync @inkeep/agents-ui-cloud changelog"
          body: |
            Automated sync of the `@inkeep/agents-ui-cloud` changelog from the [agents-ui](https://github.com/inkeep/agents-ui) repository.
          labels: documentation
          delete-branch: true
