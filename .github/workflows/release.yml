name: Publish

# Responsibility split (see agents-private for the other half):
#
#   agents-private  -> owns the "Version Packages" PR for the 10 public
#                      @inkeep/agents-* packages. When that PR merges,
#                      copybara syncs the version bumps here and deletes
#                      the .changeset/*.md files.
#   inkeep/agents   -> THIS file. On push to main with no pending
#                      changesets, publish the bumped packages to npm via
#                      Trusted Publishing (OIDC), then fire a
#                      repository_dispatch back to agents-private with
#                      the outcome.
#
# We intentionally do NOT create Version Packages PRs here. If you see a
# .changeset/*.md on main it means copybara hasn't caught up yet, or
# someone added a changeset directly to this repo (shouldn't happen).
# In either case this workflow no-ops on that run — the next sync will
# consume the changesets once the corresponding Version PR merges on
# agents-private.

on:
  workflow_dispatch:
  push:
    paths:
      - ".changeset/**"
      - "packages/**"
      - "agents-cli/**"
      - "agents-api/**"
    branches:
      - main
      - chat-to-edit

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install
        uses: ./.github/composite-actions/install

      - name: Setup npm for OIDC publishing
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm 11.5.1+ for OIDC support
        run: |
          if npm install -g npm@latest 2>/dev/null; then
            echo "npm upgraded via bundled npm"
          else
            echo "::warning::Bundled npm broken, bootstrapping from tarball"
            NPM_VER=$(node -e "fetch('https://registry.npmjs.org/npm/latest').then(r=>r.json()).then(d=>console.log(d.version))")
            curl -fsSL "https://registry.npmjs.org/npm/-/npm-${NPM_VER}.tgz" | tar xz -C /tmp
            node /tmp/package/bin/npm-cli.js install -g "npm@${NPM_VER}"
            rm -rf /tmp/package
          fi
          echo "npm $(npm --version)"

      - name: Setup Turborepo cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Build packages
        run: pnpm build
        env:
          TURBO_TELEMETRY_DISABLED: 1
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.INTERNAL_CI_APP_ID }}
          private-key: ${{ secrets.INTERNAL_CI_APP_PRIVATE_KEY }}
          owner: inkeep
          repositories: |
            agents
            agents-private

      - name: Detect changesets
        id: detect
        run: |
          count=$(find .changeset -maxdepth 1 -name '*.md' -not -name 'README.md' -type f 2>/dev/null | wc -l | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -gt 0 ]; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
            echo "Found $count pending changeset(s). Agents-private owns Version Packages PR creation; skipping publish."
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
            echo "No pending changesets; will attempt to publish any unreleased versions."
          fi

      # chat-to-edit still gets a dev-like snapshot publish on every push.
      # Skip this branch entirely for main — main is the production path.
      - name: Publish chat-to-edit snapshot
        id: snapshot
        if: github.ref == 'refs/heads/chat-to-edit'
        run: |
          set -euo pipefail
          pnpm changeset version --snapshot chat-to-edit
          pnpm changeset publish --tag chat-to-edit --provenance
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          HUSKY: 0

      # Main branch: publish whatever package versions are ahead of npm.
      # This is the "Version PR got merged on agents-private, copybara
      # delivered the bump, now ship it" path.
      #
      # History: the original version used a grep pattern matching
      # changesets v1's "Publishing ... at ..." log format. Under
      # `set -o pipefail`, grep-no-match exited 1 and failed the whole
      # step - which fired agents-release-failure even though npm publish
      # had actually succeeded. Packages at 0.69.0 shipped but the GH
      # Release and Vercel prod deploy were skipped. Defensive rewrite
      # below: derive `published` from a presence check in the log, and
      # fall back to package.json for the version so grep format drift
      # never again misreports a successful publish.
      - name: Publish main release
        id: publish
        if: github.ref == 'refs/heads/main' && steps.detect.outputs.has_changesets == 'false'
        run: |
          set -euo pipefail
          # --provenance required for npm Trusted Publishing attestations.
          pnpm changeset publish --provenance | tee /tmp/publish.log

          # Changesets v2 emits "packages published successfully" after a
          # successful publish of >=1 package; a no-op (no pending bumps)
          # does not. Use that as the ground truth instead of relying on
          # a regex that matches the old "Publishing \"X\" at \"Y\"" line.
          if ! grep -q "packages published successfully" /tmp/publish.log; then
            echo "published=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # All packages in the public-agents release group share a
          # version by design (see config/release-groups.json), so
          # reading agents-core's package.json is authoritative.
          VERSION=$(node -p "require('./packages/agents-core/package.json').version")

          # Ground-truth check: `pnpm changeset publish` returning the
          # success marker is necessary but not sufficient. Partial
          # publish (package N fails after N-1 succeed) can still leave
          # the marker in the log if the failure was cosmetic, and log
          # phrase drift in changesets v3+ would also pass the grep.
          # Verify every @inkeep/ workspace package is actually on npm
          # at the declared VERSION before reporting success downstream.
          # Missing packages → fail the step so the failure notifier
          # fires on agents-private (versus silently reporting green).
          #
          # Registry propagation: `npm publish` commits to the registry
          # synchronously but the read-path CDN can lag by seconds. Per
          # package we retry up to 4x with escalating backoff (2s, 4s,
          # 8s, 16s) before declaring it genuinely missing. 30s cumulative
          # wait per package covers the widest propagation lags we've
          # observed without meaningfully slowing the success path (each
          # present package exits on attempt 1 with one `npm view` call).
          MISSING=()
          while IFS= read -r pkg_json; do
            PKG_NAME=$(node -p "require('./$pkg_json').name" 2>/dev/null || echo "")
            IS_PRIVATE=$(node -p "require('./$pkg_json').private ?? false" 2>/dev/null || echo "false")
            [ -z "$PKG_NAME" ] && continue
            [ "$IS_PRIVATE" = "true" ] && continue
            case "$PKG_NAME" in
              @inkeep/*) ;;
              *) continue ;;
            esac
            FOUND=false
            for attempt in 1 2 3 4; do
              if npm view "$PKG_NAME@$VERSION" version >/dev/null 2>&1; then
                FOUND=true
                break
              fi
              if [ "$attempt" -lt 4 ]; then
                sleep $((attempt * 2))
              fi
            done
            if [ "$FOUND" = "false" ]; then
              MISSING+=("$PKG_NAME")
            fi
          done < <(find packages -maxdepth 2 -name package.json -not -path '*/node_modules/*')

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Publish log reported success, but these packages are NOT on npm at v$VERSION after 30s of retries: ${MISSING[*]}"
            echo "::error::Likely causes: partial publish (some packages published, others failed) or log-marker drift. Propagation lag is already ruled out by the retry loop."
            echo "::error::Re-running this workflow is safe — changeset publish is idempotent (already-published versions no-op)."
            echo "published=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "All @inkeep/ workspace packages verified present on npm at v$VERSION."
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "published=true" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          HUSKY: 0

      # Reverse-sync: tell agents-private the outcome so its
      # release-handler.yml can create the GitHub Release (which
      # triggers the existing Vercel prod deploy) or open an issue.
      #
      # Both success and failure dispatches run through a bash retry
      # loop rather than `peter-evans/repository-dispatch` because the
      # action has no built-in retry. If GitHub's API flakes transiently
      # (5xx / rate limit) during the dispatch, npm publish has already
      # committed but the reverse-sync is silently lost — no GH Release,
      # no Vercel prod deploy, no tracking issue. That was the shape of
      # at least one prior silent stranding. 3 attempts with backoff.
      - name: Notify agents-private (success)
        if: github.ref == 'refs/heads/main' && steps.publish.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ steps.publish.outputs.version }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # `gh api -f` and `--raw-field` both send values as strings. The
          # repository_dispatch endpoint requires client_payload to be a JSON
          # object, so `--raw-field "client_payload=$JSON"` returns HTTP 422
          # "is not an object" and the dispatch is lost. Build the full
          # request body with jq and pipe it via `--input -` so client_payload
          # arrives nested correctly.
          #
          # History: v0.70.0 stranded exactly this way - npm published, both
          # success AND failure dispatches 422'd, no GitHub Release, no
          # Vercel prod deploy, no tracking issue. Manual recovery required
          # a synthetic dispatch with `-F 'client_payload[version]=...'`.
          for attempt in 1 2 3; do
            if jq -n \
                 --arg version "$VERSION" \
                 --arg run_url "$RUN_URL" \
                 --arg commit_sha "$COMMIT_SHA" \
                 '{event_type: "agents-release-success",
                   client_payload: {version: $version, run_url: $run_url, commit_sha: $commit_sha}}' \
               | gh api repos/inkeep/agents-private/dispatches -X POST --input -; then
              echo "agents-release-success dispatched (attempt $attempt)"
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "::warning::dispatch attempt $attempt failed; retrying in $((attempt * 5))s"
              sleep $((attempt * 5))
            fi
          done
          echo "::error::Failed to dispatch agents-release-success after 3 attempts. npm published but downstream cascade (GH Release, Vercel deploy) will not fire automatically."
          exit 1

      # Catch-all failure notifier. Previously gated on
      # `steps.detect.outputs.has_changesets == 'false'`, which meant
      # failures BEFORE the detect step ran (install, build, token gen)
      # evaluated the condition to false and silently skipped the
      # dispatch — agents-private never opened a tracking issue and
      # the red run sat invisibly in the Actions tab. `failure()` alone
      # on main covers every pre-detect failure path too.
      - name: Notify agents-private (failure)
        if: github.ref == 'refs/heads/main' && failure()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ steps.publish.outputs.version }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Same pipe-JSON-via-stdin pattern as the success dispatch above.
          # Previously used `gh api --raw-field "client_payload=$PAYLOAD"`,
          # which sends the JSON as a string and returns 422, meaning the
          # failure-notify itself failed silently and agents-private never
          # opened a tracking issue. Classic reporter-of-failures-cannot-
          # report-its-own-failure class.
          for attempt in 1 2 3; do
            if jq -n \
                 --arg version "${VERSION:-}" \
                 --arg run_url "$RUN_URL" \
                 --arg commit_sha "$COMMIT_SHA" \
                 --arg conclusion "failure" \
                 --arg error "release.yml failed on main - see run logs" \
                 '{event_type: "agents-release-failure",
                   client_payload: {version: $version, run_url: $run_url, commit_sha: $commit_sha, conclusion: $conclusion, error: $error}}' \
               | gh api repos/inkeep/agents-private/dispatches -X POST --input -; then
              echo "agents-release-failure dispatched (attempt $attempt)"
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "::warning::failure-dispatch attempt $attempt failed; retrying in $((attempt * 5))s"
              sleep $((attempt * 5))
            fi
          done
          echo "::error::Failed to dispatch agents-release-failure after 3 attempts. The underlying failure is NOT being tracked on agents-private."
          exit 1
