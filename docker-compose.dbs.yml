services:
  doltgres-db:
    image: dolthub/doltgresql:latest
    pull_policy: always
    restart: unless-stopped
    environment:
      DOLTGRES_USER: appuser
      DOLTGRES_PASSWORD: password
      DOLTGRES_DB: inkeep_agents
    ports:
      # Host port must match the port in INKEEP_AGENTS_MANAGE_DATABASE_URL (.env)
      - "${DOLTGRES_PORT:-5432}:5432"
    volumes:
      - doltgres-data:/var/lib/doltgres
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=password psql -h localhost -U appuser -d inkeep_agents -c 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
  postgres-db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: inkeep_agents
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: password
    ports:
      # Host port must match the port in INKEEP_AGENTS_RUN_DATABASE_URL (.env)
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d inkeep_agents"]
      interval: 2s
      timeout: 3s
      retries: 30

  # SpiceDB for local authorization (persistent)
  spicedb:
    image: authzed/spicedb:latest
    command: serve
    restart: unless-stopped
    ports:
      # gRPC host port must match the port in SPICEDB_ENDPOINT (.env)
      - "${SPICEDB_GRPC_PORT:-50051}:50051"  # gRPC
      - "${SPICEDB_HTTP_PORT:-8443}:8443"    # HTTP
    environment:
      SPICEDB_GRPC_PRESHARED_KEY: "dev-secret-key"
      SPICEDB_DATASTORE_ENGINE: postgres
      SPICEDB_DATASTORE_CONN_URI: "postgres://spicedb:spicedb@spicedb-postgres:5432/spicedb?sslmode=disable"
      SPICEDB_HTTP_ENABLED: "true"
    depends_on:
      spicedb-migrate:
        condition: service_completed_successfully

  spicedb-migrate:
    image: authzed/spicedb:latest
    command: migrate head
    restart: "no"
    environment:
      SPICEDB_DATASTORE_ENGINE: postgres
      SPICEDB_DATASTORE_CONN_URI: "postgres://spicedb:spicedb@spicedb-postgres:5432/spicedb?sslmode=disable"
    depends_on:
      spicedb-postgres:
        condition: service_healthy

  spicedb-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: spicedb
      POSTGRES_PASSWORD: spicedb
      POSTGRES_DB: spicedb
    ports:
      - "${SPICEDB_POSTGRES_PORT:-5434}:5432"
    volumes:
      - spicedb-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spicedb"]
      interval: 2s
      timeout: 3s
      retries: 30

  mailpit:
    image: axllent/mailpit:v1.29.2
    ports:
      - '${MAILPIT_UI_PORT:-8025}:8025'
      # SMTP host port must match SMTP_PORT (.env) so the app can reach mailpit
      - '${SMTP_PORT:-1025}:1025'
    restart: unless-stopped

volumes:
  doltgres-data:
  postgres-data:
  spicedb-postgres-data:
